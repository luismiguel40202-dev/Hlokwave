<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Hlokwave App</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .app-card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid #00ff88; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        h1 { color: #00ff88; letter-spacing: 2px; margin-bottom: 5px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; color: black; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>HLOKWAVE</h1>
        <p>SISTEMA DE REGISTRO</p>
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="email" id="correo" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="registrar()">CREAR CUENTA</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('Sw.js');
        }

        function registrar() {
            const user = document.getElementById('nombre').value;
            if(user) {
                alert('Hlokwave: Registro exitoso para ' + user);
            } else {
                alert('Ingresa tus datos');
            }
        }
    </script>

</body>
</html>
